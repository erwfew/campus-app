<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>效园通 - 管理端</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #f5f6fa; }
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; text-align: center; }
.login-box h2 { font-size: 24px; color: #333; margin-bottom: 8px; }
.login-box p { color: #999; font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 14px; outline: none; }
.login-box input:focus { border-color: #4361ee; }
.login-box button { width: 100%; padding: 13px; background: linear-gradient(135deg, #4361ee, #3a56d4); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
.login-box .error { color: #f44336; font-size: 13px; margin-bottom: 10px; display: none; }
.dashboard { display: none; padding: 20px; }
.nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.nav button { padding: 8px 20px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
.nav button.active { background: #4361ee; color: #fff; border-color: #4361ee; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat .num { font-size: 28px; font-weight: bold; color: #4361ee; }
.stat .label { font-size: 13px; color: #999; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
th { background: #f8f9fa; font-weight: 600; color: #555; }
.logout { float: right; color: #999; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>🏫 效园通管理端</h2>
    <p>请输入管理员账号登录</p>
    <div class="error" id="loginError"></div>
    <input type="text" id="username" placeholder="用户名" value="admin">
    <input type="password" id="password" placeholder="密码" value="admin123">
    <button onclick="login()">登 录</button>
  </div>
</div>

<div class="dashboard" id="dashboardPage">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2>🏫 效园通 · 学校管理端</h2>
    <span class="logout" onclick="logout()">退出登录</span>
  </div>
  <div class="stats" id="statsArea"></div>
  <div class="nav">
    <button class="active" onclick="showPage('teachers',this)">教师管理</button>
    <button onclick="showPage('students',this)">学生管理</button>
    <button onclick="showPage('courses',this)">课程管理</button>
    <button onclick="showPage('notices',this)">全校公告</button>
  </div>
  <div id="contentArea"></div>
</div>

<script>
const API = location.origin + '/api';
var token = localStorage.getItem('admin_token');

async function api(path, opts) {
  opts = opts || {};
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  var res = await fetch(API + path, { method: opts.method || 'GET', headers: headers, body: opts.body });
  var json = await res.json();
  if (!json.success) throw new Error(json.error && json.error.message || '请求失败');
  return json.data;
}

async function login() {
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  try {
    var data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
    if (data.user.role !== 'admin') throw new Error('需要管理员权限');
    token = data.token;
    localStorage.setItem('admin_token', token);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboardPage').style.display = 'block';
    loadDashboard();
  } catch (e) {
    var err = document.getElementById('loginError');
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  token = null;
  location.reload();
}

async function loadDashboard() {
  try {
    var d = await api('/admin/dashboard');
    var s = d.stats;
    document.getElementById('statsArea').innerHTML =
      '<div class="stat"><div class="num">' + (s.teachers || 0) + '</div><div class="label">教师</div></div>' +
      '<div class="stat"><div class="num">' + (s.students || 0) + '</div><div class="label">学生</div></div>' +
      '<div class="stat"><div class="num">' + (s.courses || 0) + '</div><div class="label">课程</div></div>' +
      '<div class="stat"><div class="num">' + (s.activeNotices || 0) + '</div><div class="label">公告</div></div>';
    showPage('teachers');
  } catch (e) {
    if (e.message.indexOf('token') >= 0 || e.message.indexOf('认证') >= 0) logout();
  }
}

async function showPage(page, btn) {
  if (btn) {
    document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }
  var area = document.getElementById('contentArea');
  area.innerHTML = '<div class="card"><p style="color:#999;">加载中...</p></div>';
  try {
    if (page === 'teachers') {
      var d = await api('/admin/users?role=teacher');
      area.innerHTML = '<div class="card"><h3>教师管理</h3><table><tr><th>姓名</th><th>用户名</th><th>学院</th><th>创建时间</th></tr>' +
        d.list.map(function(u) {
          return '<tr><td>' + u.realName + '</td><td>' + u.username + '</td><td>' + (u.college || '-') + '</td><td>' + (u.createdAt || '').slice(0,10) + '</td></tr>';
        }).join('') + '</table><p style="color:#999;font-size:12px;margin-top:10px;">共 ' + d.total + ' 位教师</p></div>';
    } else if (page === 'students') {
      var d = await api('/admin/users?role=student&pageSize=20');
      area.innerHTML = '<div class="card"><h3>学生管理</h3><table><tr><th>学号</th><th>姓名</th><th>用户名</th><th>学院</th></tr>' +
        d.list.map(function(u) {
          return '<tr><td>' + (u.studentId || '-') + '</td><td>' + u.realName + '</td><td>' + u.username + '</td><td>' + (u.college || '-') + '</td></tr>';
        }).join('') + '</table><p style="color:#999;font-size:12px;margin-top:10px;">共 ' + d.total + ' 名学生</p></div>';
    } else if (page === 'courses') {
      var d = await api('/admin/courses');
      area.innerHTML = '<div class="card"><h3>课程管理</h3><table><tr><th>课程名称</th><th>授课教师</th><th>类型</th><th>学生数</th><th>状态</th></tr>' +
        d.map(function(c) {
          return '<tr><td>' + c.name + '</td><td>' + c.teacherName + '</td><td>' + c.type + '</td><td>' + c.studentCount + '人</td><td>' + (c.status === 'active' ? '✅ 进行中' : '📦 已归档') + '</td></tr>';
        }).join('') + '</table></div>';
    } else if (page === 'notices') {
      var d = await api('/admin/notices');
      area.innerHTML = '<div class="card"><h3>全校公告</h3>' +
        (d.length === 0 ? '<p style="color:#999;">暂无公告</p>' :
        '<table><tr><th>标题</th><th>日期</th></tr>' +
        d.map(function(n) {
          return '<tr><td>' + (n.important ? '🔴 ' : '') + n.title + '</td><td>' + n.date + '</td></tr>';
        }).join('') + '</table>') + '</div>';
    }
  } catch (e) {
    area.innerHTML = '<div class="card"><p style="color:#f44336;">加载失败: ' + e.message + '</p></div>';
  }
}

if (token) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  loadDashboard();
}
</script>
</body>
</html>
