<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>аЇдАЭЈ - НЬЪІЖЫ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #f5f6fa; }
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; text-align: center; }
.login-box h2 { font-size: 24px; color: #333; margin-bottom: 8px; }
.login-box p { color: #999; font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 14px; outline: none; transition: border 0.2s; }
.login-box input:focus { border-color: #4361ee; }
.login-box button { width: 100%; padding: 13px; background: linear-gradient(135deg, #4361ee, #3a56d4); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
.login-box .error { color: #f44336; font-size: 13px; margin-bottom: 10px; display: none; }
.dashboard { display: none; padding: 20px; }
.nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.nav button { padding: 8px 20px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
.nav button.active { background: #4361ee; color: #fff; border-color: #4361ee; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat .num { font-size: 28px; font-weight: bold; color: #4361ee; }
.stat .label { font-size: 13px; color: #999; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
th { background: #f8f9fa; font-weight: 600; color: #555; }
.logout { float: right; color: #999; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>?? аЇдАЭЈНЬЪІЖЫ</h2>
    <p>ЧыЪфШыеЫКХУмТыЕЧТМ</p>
    <div class="error" id="loginError"></div>
    <input type="text" id="username" placeholder="гУЛЇУћ" value="teacher1">
    <input type="password" id="password" placeholder="УмТы" value="teacher123">
    <button onclick="login()">ЕЧ ТМ</button>
  </div>
</div>

<div class="dashboard" id="dashboardPage">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2>?? аЇдАЭЈ ЁЄ НЬЪІЙЄзїЬЈ</h2>
    <span class="logout" onclick="logout()">ЭЫГіЕЧТМ</span>
  </div>
  <div class="stats" id="statsArea"></div>
  <div class="nav">
    <button class="active" onclick="showPage('courses',this)">ЮвЕФПЮГЬ</button>
    <button onclick="showPage('homework',this)">зївЕЙмРэ</button>
    <button onclick="showPage('grades',this)">ГЩМЈТМШы</button>
    <button onclick="showPage('notices',this)">ПЮГЬЙЋИц</button>
  </div>
  <div id="contentArea"></div>
</div>

<script>
const API = location.origin + '/api';
let token = localStorage.getItem('token');

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  const json = await res.json();
  if (!json.success) throw new Error(json.error?.message || 'ЧыЧѓЪЇАм');
  return json.data;
}

async function login() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  try {
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
    token = data.token;
    localStorage.setItem('token', token);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboardPage').style.display = 'block';
    loadDashboard();
  } catch (e) {
    const err = document.getElementById('loginError');
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('token');
  token = null;
  location.reload();
}

async function loadDashboard() {
  try {
    const d = await api('/teacher/dashboard');
    document.getElementById('statsArea').innerHTML =
      '<div class="stat"><div class="num">' + d.courseCount + '</div><div class="label">ПЮГЬЪ§</div></div>' +
      '<div class="stat"><div class="num">' + d.studentCount + '</div><div class="label">бЇЩњЪ§</div></div>' +
      '<div class="stat"><div class="num">' + d.todayClasses + '</div><div class="label">НёШеПЮЪБ</div></div>' +
      '<div class="stat"><div class="num">' + d.pendingGrading + '</div><div class="label">Д§ХњИФ</div></div>';
    showPage('courses');
  } catch (e) {
    if (e.message.includes('token') || e.message.includes('ШЯжЄ')) logout();
  }
}

async function showPage(page, btn) {
  if (btn) {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="card"><p style="color:#999;">Мгдижа...</p></div>';
  try {
    if (page === 'courses') {
      const courses = await api('/teacher/courses');
      area.innerHTML = '<div class="card"><h3>ЮвЕФПЮГЬ</h3><table><tr><th>ПЮГЬУћГЦ</th><th>ЩЯПЮЪБМф</th><th>НЬЪв</th><th>бЇЩњЪ§</th></tr>' +
        courses.map(c => '<tr><td>' + c.name + '</td><td>жм' + ['вЛ','Жў','Ш§','ЫФ','Юх','Сљ','Ше'][c.weekDay] + ' Ек' + c.startSection + '-' + c.endSection + 'Нк</td><td>' + c.location + '</td><td>' + c.studentCount + 'ШЫ</td></tr>').join('') +
        '</table></div>';
    } else if (page === 'homework') {
      const data = await api('/teacher/homework');
      area.innerHTML = '<div class="card"><h3>зївЕЙмРэ</h3><table><tr><th>зївЕУћГЦ</th><th>ПЮГЬ</th><th>НижЙЪБМф</th><th>ЬсНЛТЪ</th></tr>' +
        (data || []).map(h => '<tr><td>' + h.title + '</td><td>' + h.course + '</td><td>' + (h.deadline || '-') + '</td><td>' + h.submitted + '/' + h.total + '</td></tr>').join('') +
        '</table></div>';
    } else if (page === 'grades') {
      const courses = await api('/teacher/courses');
      area.innerHTML = '<div class="card"><h3>ГЩМЈТМШы</h3><p style="color:#999;margin-bottom:12px;">бЁдёПЮГЬВщПДГЩМЈ</p><table><tr><th>ПЮГЬУћГЦ</th><th>бЇЩњЪ§</th><th>Вйзї</th></tr>' +
        courses.map(c => '<tr><td>' + c.name + '</td><td>' + c.studentCount + 'ШЫ</td><td><button onclick="showGrades(' + c.id + ')" style="padding:4px 12px;background:#4361ee;color:#fff;border:none;border-radius:6px;cursor:pointer;">ВщПД</button></td></tr>').join('') +
        '</table></div>';
    } else if (page === 'notices') {
      const notices = await api('/teacher/notices');
      area.innerHTML = '<div class="card"><h3>ПЮГЬЙЋИц</h3>' +
        (notices.length === 0 ? '<p style="color:#999;">днЮоЙЋИц</p>' :
        '<table><tr><th>БъЬт</th><th>ПЮГЬ</th><th>ШеЦк</th></tr>' +
        notices.map(n => '<tr><td>' + (n.important ? '?? ' : '') + n.title + '</td><td>' + n.course + '</td><td>' + n.date + '</td></tr>').join('') + '</table>') +
        '</div>';
    }
  } catch (e) {
    area.innerHTML = '<div class="card"><p style="color:#f44336;">МгдиЪЇАм: ' + e.message + '</p></div>';
  }
}

async function showGrades(courseId) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="card"><p>Мгдижа...</p></div>';
  try {
    const grades = await api('/teacher/grades?courseId=' + courseId);
    area.innerHTML = '<div class="card"><h3>ГЩМЈСаБэ</h3><button onclick="showPage(\'grades\')" style="float:right;padding:4px 12px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;margin-bottom:10px;">ЗЕЛи</button><table><tr><th>бЇКХ</th><th>аеУћ</th><th>ЦНЪБ</th><th>Цкжа</th><th>ЦкФЉ</th><th>змЦР</th></tr>' +
      grades.map(g => '<tr><td>' + g.studentId + '</td><td>' + g.name + '</td><td>' + g.usual + '</td><td>' + g.midterm + '</td><td>' + g.final + '</td><td><b>' + g.total + '</b></td></tr>').join('') +
      '</table></div>';
  } catch (e) {
    area.innerHTML = '<div class="card"><p style="color:#f44336;">' + e.message + '</p></div>';
  }
}

// здЖЏЕЧТМ
if (token) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  loadDashboard();
}
</script>
</body>
</html>
