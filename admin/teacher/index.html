<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>效园通 - 教师端</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #f5f6fa; }
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; text-align: center; }
.login-box h2 { font-size: 24px; color: #333; margin-bottom: 8px; }
.login-box p { color: #999; font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 14px; outline: none; transition: border 0.2s; }
.login-box input:focus { border-color: #4361ee; }
.login-box button { width: 100%; padding: 13px; background: linear-gradient(135deg, #4361ee, #3a56d4); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
.login-box .error { color: #f44336; font-size: 13px; margin-bottom: 10px; display: none; }
.dashboard { display: none; padding: 20px; }
.nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.nav button { padding: 8px 20px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
.nav button.active { background: #4361ee; color: #fff; border-color: #4361ee; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat .num { font-size: 28px; font-weight: bold; color: #4361ee; }
.stat .label { font-size: 13px; color: #999; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
th { background: #f8f9fa; font-weight: 600; color: #555; }
.logout { float: right; color: #999; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>📚 效园通教师端</h2>
    <p>请输入账号密码登录</p>
    <div class="error" id="loginError"></div>
    <input type="text" id="username" placeholder="用户名" value="teacher1">
    <input type="password" id="password" placeholder="密码" value="teacher123">
    <button onclick="login()">登 录</button>
  </div>
</div>

<div class="dashboard" id="dashboardPage">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2>📚 效园通 · 教师工作台</h2>
    <span class="logout" onclick="logout()">退出登录</span>
  </div>
  <div class="stats" id="statsArea"></div>
  <div class="nav">
    <button class="active" onclick="showPage('courses',this)">我的课程</button>
    <button onclick="showPage('homework',this)">作业管理</button>
    <button onclick="showPage('grades',this)">成绩录入</button>
    <button onclick="showPage('attendance',this)">课堂考勤</button>
    <button onclick="showPage('notices',this)">课程公告</button>
  </div>
  <div id="contentArea"></div>
</div>

<script>
const API = location.origin + '/api';
let token = localStorage.getItem('token');

async function api(path, opts) {
  opts = opts || {};
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  var res = await fetch(API + path, { method: opts.method || 'GET', headers: headers, body: opts.body });
  var json = await res.json();
  if (!json.success) throw new Error(json.error && json.error.message || '请求失败');
  return json.data;
}

async function login() {
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  try {
    var data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
    token = data.token;
    localStorage.setItem('token', token);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboardPage').style.display = 'block';
    loadDashboard();
  } catch (e) {
    var err = document.getElementById('loginError');
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('token');
  token = null;
  location.reload();
}

function weekDayStr(d) {
  var days = ['一','二','三','四','五','六','日'];
  return days[d - 1] || d;
}

async function loadDashboard() {
  try {
    var d = await api('/teacher/dashboard');
    document.getElementById('statsArea').innerHTML =
      '<div class="stat"><div class="num">' + d.courseCount + '</div><div class="label">课程数</div></div>' +
      '<div class="stat"><div class="num">' + d.studentCount + '</div><div class="label">学生数</div></div>' +
      '<div class="stat"><div class="num">' + d.todayClasses + '</div><div class="label">今日课时</div></div>' +
      '<div class="stat"><div class="num">' + d.pendingGrading + '</div><div class="label">待批改</div></div>';
    showPage('courses');
  } catch (e) {
    if (e.message.indexOf('token') >= 0 || e.message.indexOf('认证') >= 0) logout();
  }
}

async function showPage(page, btn) {
  if (btn) {
    document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }
  var area = document.getElementById('contentArea');
  area.innerHTML = '<div class="card"><p style="color:#999;">加载中...</p></div>';
  try {
    if (page === 'courses') {
      var courses = await api('/teacher/courses');
      area.innerHTML = '<div class="card"><h3>我的课程</h3><table><tr><th>课程名称</th><th>上课时间</th><th>教室</th><th>学生数</th></tr>' +
        courses.map(function(c) {
          return '<tr><td>' + c.name + '</td><td>周' + weekDayStr(c.weekDay) + ' 第' + c.startSection + '-' + c.endSection + '节</td><td>' + c.location + '</td><td>' + c.studentCount + '人</td></tr>';
        }).join('') + '</table></div>';
    } else if (page === 'homework') {
      var data = await api('/teacher/homework');
      area.innerHTML = '<div class="card"><h3>作业管理</h3><table><tr><th>作业名称</th><th>课程</th><th>截止时间</th><th>提交率</th></tr>' +
        (data || []).map(function(h) {
          return '<tr><td>' + h.title + '</td><td>' + h.course + '</td><td>' + (h.deadline || '-') + '</td><td>' + h.submitted + '/' + h.total + '</td></tr>';
        }).join('') + '</table></div>';
    } else if (page === 'attendance') {
      var courses = await api('/teacher/courses');
      area.innerHTML = '<div class="card"><h3>课堂考勤</h3><p style="color:#999;margin-bottom:12px;">选择课程查看学生考勤</p><table><tr><th>课程名称</th><th>上课时间</th><th>学生数</th><th>操作</th></tr>' +
        courses.map(function(c) {
          return '<tr><td>' + c.name + '</td><td>周' + weekDayStr(c.weekDay) + '</td><td>' + c.studentCount + '人</td><td><button onclick="showAttendance(' + c.id + ',\'' + c.name + '\')" style="padding:4px 12px;background:#4361ee;color:#fff;border:none;border-radius:6px;cursor:pointer;">查看考勤</button></td></tr>';
        }).join('') + '</table></div>';
    } else if (page === 'grades') {
      var courses = await api('/teacher/courses');
      area.innerHTML = '<div class="card"><h3>成绩录入</h3><p style="color:#999;margin-bottom:12px;">选择课程查看成绩</p><table><tr><th>课程名称</th><th>学生数</th><th>操作</th></tr>' +
        courses.map(function(c) {
          return '<tr><td>' + c.name + '</td><td>' + c.studentCount + '人</td><td><button onclick="showGrades(' + c.id + ')" style="padding:4px 12px;background:#4361ee;color:#fff;border:none;border-radius:6px;cursor:pointer;">查看</button></td></tr>';
        }).join('') + '</table></div>';
    } else if (page === 'notices') {
      var notices = await api('/teacher/notices');
      area.innerHTML = '<div class="card"><h3>课程公告</h3>' +
        (notices.length === 0 ? '<p style="color:#999;">暂无公告</p>' :
        '<table><tr><th>标题</th><th>课程</th><th>日期</th></tr>' +
        notices.map(function(n) {
          return '<tr><td>' + (n.important ? '🔴 ' : '') + n.title + '</td><td>' + n.course + '</td><td>' + n.date + '</td></tr>';
        }).join('') + '</table>') + '</div>';
    }
  } catch (e) {
    area.innerHTML = '<div class="card"><p style="color:#f44336;">加载失败: ' + e.message + '</p></div>';
  }
}

async function showGrades(courseId) {
  var area = document.getElementById('contentArea');
  area.innerHTML = '<div class="card"><p>加载中...</p></div>';
  try {
    var grades = await api('/teacher/grades?courseId=' + courseId);
    area.innerHTML = '<div class="card"><h3>成绩列表</h3><button onclick="showPage(\'grades\')" style="float:right;padding:4px 12px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;margin-bottom:10px;">返回</button><table><tr><th>学号</th><th>姓名</th><th>平时</th><th>期中</th><th>期末</th><th>总评</th></tr>' +
      grades.map(function(g) {
        return '<tr><td>' + g.studentId + '</td><td>' + g.name + '</td><td>' + g.usual + '</td><td>' + g.midterm + '</td><td>' + g['final'] + '</td><td><b>' + g.total + '</b></td></tr>';
      }).join('') + '</table></div>';
  } catch (e) {
    area.innerHTML = '<div class="card"><p style="color:#f44336;">' + e.message + '</p></div>';
  }
}

async function showAttendance(courseId, courseName) {
  var area = document.getElementById('contentArea');
  area.innerHTML = '<div class="card"><p>加载中...</p></div>';
  try {
    var d = await api('/teacher/courses/' + courseId + '/students');
    var today = new Date().toISOString().slice(0, 10);
    var students = d.students || [];
    var html = '<div class="card"><h3>课堂考勤 - ' + courseName + '</h3>';
    html += '<p style="color:#999;margin-bottom:12px;">日期: ' + today + '</p>';
    html += '<button onclick="markAllAttendance(' + courseId + ',\'present\')" style="padding:4px 12px;background:#52c41a;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-bottom:12px;margin-right:8px;">全部签到</button>';
    html += '<button onclick="showPage(\'attendance\')" style="padding:4px 12px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;margin-bottom:12px;">返回</button>';
    html += '<table><tr><th>学号</th><th>姓名</th><th>出勤率</th><th>今日状态</th><th>操作</th></tr>';
    html += students.map(function(s) {
      var rate = s.attendanceRate || 0;
      var color = rate >= 90 ? '#52c41a' : rate >= 70 ? '#faad14' : '#f44336';
      return '<tr><td>' + s.studentId + '</td><td>' + s.realName + '</td><td style="color:' + color + ';font-weight:bold;">' + rate + '%</td><td>' + (s.todayStatus || '-') + '</td><td>' +
        '<button onclick="markAttendance(' + courseId + ',' + s.id + ',\'present\',this)" style="padding:2px 8px;background:#52c41a;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:2px;font-size:12px;">正常</button>' +
        '<button onclick="markAttendance(' + courseId + ',' + s.id + ',\'late\',this)" style="padding:2px 8px;background:#faad14;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:2px;font-size:12px;">迟到</button>' +
        '<button onclick="markAttendance(' + courseId + ',' + s.id + ',\'absent\',this)" style="padding:2px 8px;background:#f44336;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:2px;font-size:12px;">缺勤</button>' +
        '<button onclick="markAttendance(' + courseId + ',' + s.id + ',\'leave\',this)" style="padding:2px 8px;background:#722ed1;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:2px;font-size:12px;">请假</button>' +
        '<button onclick="markAttendance(' + courseId + ',' + s.id + ',\'official\',this)" style="padding:2px 8px;background:#1890ff;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;">公假</button>' +
        '</td></tr>';
    }).join('');
    html += '</table></div>';
    area.innerHTML = html;
  } catch (e) {
    area.innerHTML = '<div class="card"><p style="color:#f44336;">' + e.message + '</p></div>';
  }
}

async function markAttendance(courseId, studentId, status, btn) {
  var statusMap = { present: '✅ 正常', absent: '❌ 缺勤', late: '⏰ 迟到', leave: '📝 请假', official: '🏛️ 公假' };
  try {
    await api('/teacher/attendance', { method: 'POST', body: JSON.stringify({ courseId: courseId, records: [{ studentId: studentId, status: status }] }) });
    // 更新按钮高亮和状态显示
    if (btn) {
      var row = btn.closest('tr');
      var statusCell = row.children[3];
      statusCell.innerHTML = statusMap[status] || status;
      statusCell.style.color = '#4361ee';
      statusCell.style.fontWeight = 'bold';
    }
  } catch (e) { alert('提交失败: ' + e.message); }
}

async function markAllAttendance(courseId, status) {
  try {
    var d = await api('/teacher/courses/' + courseId + '/students');
    var records = (d.students || []).map(function(s) { return { studentId: s.id, status: status }; });
    await api('/teacher/attendance', { method: 'POST', body: JSON.stringify({ courseId: courseId, records: records }) });
    alert('全部签到完成，共 ' + records.length + ' 人');
    showAttendance(courseId, '');
  } catch (e) { alert('提交失败: ' + e.message); }
}

// 自动登录
if (token) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  loadDashboard();
}
</script>
</body>
</html>
